name: Next.js CI

# Workflow triggers
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    - cron: '40 13 * * *'  # daily at 7:00 PM IST (1:30 PM UTC)

# Workflow-level variables (not secret)
env:
  NODE_ENV: ${{ secrets.NODE_ENV }}     
  USERNAME: ${{ secrets.USERNAME }}       
  API_KEY: ${{ secrets.API_KEY }}  

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: next-app  # Ensure all commands run in the `next-app` folder

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint
      - name: Run ESLint
        run: npx eslint .

      # Step 5: Run Tests with Coverage
      - name: Run Tests
        run: npm run test

      # Step 6: Build Next.js app
      - name: Build Application
        run: npm run build

      # Step 7: Show context & variables (for debug)
      - name: Show context and variables
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Branch/Ref: $GITHUB_REF"
          echo "PR source branch: $GITHUB_HEAD_REF"
          echo "PR target branch: $GITHUB_BASE_REF"
          echo "Workflow NODE_ENV: $NODE_ENV"
          echo "Workflow USERNAME: $USERNAME"
          echo "API_KEY: $API_KEY (masked automatically)"