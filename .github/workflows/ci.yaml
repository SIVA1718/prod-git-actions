name: Next.js CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    - cron: '30 19 * * *'

env:
  NODE_ENV: ${{ secrets.NODE_ENV }}
  USERNAME: ${{ secrets.USERNAME }}
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Test secrets logging
        run: |
          echo "Testing if secrets are accessible:"
          echo "NODE_ENV: ${{ secrets.NODE_ENV != '' && '✅ Set' || '❌ Not set' }}"
          echo "USERNAME: ${{ secrets.USERNAME != '' && '✅ Set' || '❌ Not set' }}"
          echo "API_KEY: ${{ secrets.API_KEY != '' && '✅ Set' || '❌ Not set' }}"
          
          # This will show as *** in logs (automatically masked by GitHub)
          echo "NODE_ENV value: $NODE_ENV"
          echo "USERNAME value: $USERNAME" 
          echo "API_KEY value: $API_KEY"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: next-app
        run: npm ci

      - name: Run ESLint
        working-directory: next-app
        run: npm run lint

      - name: Run Tests
        working-directory: next-app
        run: npm run test

      - name: Build Application
        working-directory: next-app
        run: npm run build