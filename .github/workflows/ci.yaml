name: Next.js CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6


      # Step 3: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Step 4: Install dependencies (with dev dependencies)
      - name: Install dependencies
        working-directory: next-app
        run: npm ci

      # Step 5: Run ESLint
      - name: Run ESLint
        working-directory: next-app
        run: npm run lint

      # Step 6: Run Tests
      - name: Run Tests
        working-directory: next-app
        run: npm run test

      # Step 7: Build Next.js app
      - name: Build Application
        working-directory: next-app
        run: npm run build